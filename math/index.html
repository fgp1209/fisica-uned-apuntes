<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>MathNote Live</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/mathlive/mathlive.min.js"></script>
  <script defer src="app.js"></script>
</head>
<body>
  <header class="topbar">
    <div class="brand">MathNote</div>
    <button id="addLine" title="Nueva línea">↵</button>
    <button id="copyLatex" title="Copiar LaTeX">copy</button>
    <button id="toggleSource" title="Ver LaTeX">src</button>
    <button id="clearAll" title="Borrar todo">clear</button>
  </header>

  <nav class="toolbar" aria-label="plantillas matemáticas">
    <button data-latex="\\frac{#0}{#?}">a/b</button>
    <button data-latex="\\sqrt{#0}">√</button>
    <button data-latex="^{#?}">x^</button>
    <button data-latex="_{#?}">x_</button>
    <button data-latex="\\left(#0\\right)">( )</button>
    <button data-latex="\\left[#0\\right]">[ ]</button>
    <button data-latex="\\left\\{#0\\right\\}">{ }</button>
    <button data-latex="\\left|#0\\right|">| |</button>
    <button data-latex="\\left\\lVert#0\\right\\rVert">|| ||</button>

    <button data-latex="\\int_{#?}^{#?} #?\\,d#?">∫</button>
    <button data-latex="\\sum_{#?}^{#?} #?">Σ</button>
    <button data-latex="\\prod_{#?}^{#?} #?">Π</button>
    <button data-latex="\\lim_{#?\\to#?} #?">lim</button>
    <button data-latex="\\frac{d#?}{d#?}">d/dx</button>
    <button data-latex="\\frac{\\partial #?}{\\partial #?}">∂/∂x</button>
    <button data-latex="\\frac{\\partial^2 #?}{\\partial #?\\partial #?}">∂²</button>

    <button data-latex="\\sin\u2061(#?)">sin</button>
    <button data-latex="\\cos\u2061(#?)">cos</button>
    <button data-latex="\\tan\u2061(#?)">tan</button>
    <button data-latex="\\log\u2061(#?)">log</button>
    <button data-latex="\\ln\u2061(#?)">ln</button>
    <button data-latex="e^{#?}">e^</button>

    <button data-latex="\\alpha">α</button>
    <button data-latex="\\beta">β</button>
    <button data-latex="\\gamma">γ</button>
    <button data-latex="\\delta">δ</button>
    <button data-latex="\\theta">θ</button>
    <button data-latex="\\lambda">λ</button>
    <button data-latex="\\mu">μ</button>
    <button data-latex="\\pi">π</button>
    <button data-latex="\\omega">ω</button>
    <button data-latex="\\infty">∞</button>

    <button data-latex="\\bar{#0}">bar</button>
    <button data-latex="\\vec{#0}">vec</button>
    <button data-latex="\\nabla">∇</button>
    <button data-latex="\\in">∈</button>
    <button data-latex="\\notin">∉</button>
    <button data-latex="\\subset">⊂</button>
    <button data-latex="\\forall">∀</button>
    <button data-latex="\\exists">∃</button>
    <button data-latex="\\Rightarrow">⇒</button>
    <button data-latex="\\Leftrightarrow">⇔</button>

    <button data-latex="\\begin{bmatrix}#?&#?\\\\#?&#?\\end{bmatrix}">m2</button>
    <button data-latex="\\begin{bmatrix}#?&#?&#?\\\\#?&#?&#?\\\\#?&#?&#?\\end{bmatrix}">m3</button>
    <button data-latex="\\begin{vmatrix}#?&#?\\\\#?&#?\\end{vmatrix}">det2</button>
    <button data-latex="\\begin{vmatrix}#?&#?&#?\\\\#?&#?&#?\\\\#?&#?&#?\\end{vmatrix}">det3</button>
    <button data-latex="\\begin{cases}#?,& #?\\\\#?,& #?\\end{cases}">cases</button>
    <button data-latex="\\begin{aligned}#?&=#?\\\\#?&=#?\\end{aligned}">align</button>
  </nav>

  <section class="commandbar">
    <input id="commandInput" spellcheck="false" autocomplete="off" placeholder="atajos: *m3x3, *det3, *cases, *cr, *cauchy, int, sum, frac" />
    <button id="runCommand">insert</button>
  </section>

  <main id="paper" aria-label="hoja matemática"></main>

  <aside id="sourcePanel" hidden>
    <div class="sourceHeader">
      <span>LaTeX generado</span>
      <button id="closeSource">cerrar</button>
    </div>
    <textarea id="latexOutput" readonly></textarea>
  </aside>

  <template id="lineTemplate">
    <div class="line">
      <math-field class="mathline" virtual-keyboard-mode="manual"></math-field>
    </div>
  </template>
</body>
</html>
